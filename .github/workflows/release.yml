name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip npm publish and git tag creation)'
        required: false
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Version packages (consume changesets)
        run: pnpm changeset version

      - name: Verify version was updated
        id: check_version
        run: |
          if git diff --exit-code package.json CHANGELOG.md; then
            echo "::error::No version changes detected. Add a changeset before releasing."
            exit 1
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $NEW_VERSION"

      - name: Check tag does not already exist
        run: |
          VERSION=${{ steps.check_version.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists."
            exit 1
          fi

      - name: Commit version changes
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release v${{ steps.check_version.outputs.version }}"
          git push

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push git tags
        if: ${{ !inputs.dry_run }}
        run: git push --follow-tags

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check_version.outputs.version }}
          name: v${{ steps.check_version.outputs.version }}
          generate_release_notes: true

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "## Dry run complete" >> $GITHUB_STEP_SUMMARY
          echo "Would have released version: ${{ steps.check_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Committed version bump to main" >> $GITHUB_STEP_SUMMARY
          echo "- Published @crawlerverse/core@${{ steps.check_version.outputs.version }} to npm" >> $GITHUB_STEP_SUMMARY
          echo "- Created git tag v${{ steps.check_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Created GitHub Release" >> $GITHUB_STEP_SUMMARY
